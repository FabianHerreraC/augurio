<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Augurio Colectivo · Cognición Aumentada</title>
<style>
  :root{
    --bg:#292929;
    --ink:#FFFFFF;
    --soft:#9A9A98;
    --hair:#454543;
    --field:#1F1F1D;
    --accent:#17F7A1;
    --sans:"Helvetica Neue","Inter","Arial",sans-serif;
    --mono:"IBM Plex Mono","Courier New",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
  body{padding:24px;line-height:1.4}
  a{color:inherit}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit;background:var(--field);border:1px solid var(--hair);border-radius:6px;padding:14px 16px;font-size:16px;line-height:1.45;width:100%;outline:none;transition:border-color .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{min-height:110px;resize:vertical}

  /* topbar */
  .top{position:fixed;top:20px;right:24px;display:flex;gap:10px;align-items:center;z-index:20}
  .pill{background:var(--ink);color:var(--bg);border-radius:999px;padding:6px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .year{font-family:var(--mono);font-size:11px;color:var(--soft);letter-spacing:.08em}
  .spine{position:fixed;left:20px;top:50%;transform:translateY(-50%) rotate(180deg);writing-mode:vertical-rl;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--soft);text-transform:uppercase;z-index:20}

  /* container */
  .wrap{max-width:1080px;margin:0 auto;padding:80px 60px 60px 60px}
  @media (max-width:720px){
    .wrap{padding:80px 8px 40px 40px} body{padding:16px}
    .home-head{gap:18px}
    .hola{font-size:clamp(52px,15vw,90px)}
    .manifiesto{flex-basis:100%;min-width:0}
    .bloque-body{padding:20px 16px}
    .logo-box img{height:60px}
  }

  /* back */
  .back{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);text-decoration:none;margin-bottom:36px;transition:color .15s}
  .back:hover{color:var(--accent)}
  .back .arrow{font-size:13px}
  .back.solid{background:var(--ink);color:var(--bg);padding:8px 14px;border-radius:999px;transition:filter .15s}
  .back.solid:hover{color:var(--bg);filter:brightness(.88)}

  /* headings */
  .kicker{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}
  h1.big{font-size:clamp(38px,7vw,84px);line-height:.95;letter-spacing:-.02em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
  h2.big{font-size:clamp(28px,4.4vw,52px);line-height:1;letter-spacing:-.015em;text-transform:uppercase;font-weight:700}
  .num{font-family:var(--mono);font-size:11px;color:var(--soft);letter-spacing:.06em;vertical-align:super;margin-right:6px}
  .ctx{color:var(--soft);font-size:15px;line-height:1.5;margin:14px 0 18px;max-width:640px}

  /* home */
  .home-head{display:flex;gap:30px;align-items:flex-start;flex-wrap:wrap}
  .logo-box{flex:0 0 auto}
  .logo-box img{display:block;height:96px}
  .hola{font-size:clamp(64px,10vw,140px);line-height:.88;font-weight:500;letter-spacing:-.035em;flex:1 1 auto;margin-top:-0.09em}
  .manifiesto{flex:0 1 380px;font-size:13px;line-height:1.55;text-align:justify;min-width:260px}
  .head-bosque{display:flex;justify-content:flex-end;margin-top:16px}
  .head-bosque img{height:24px;opacity:.92}
  .head-line{height:1px;background:#4d4d4b;margin:34px 0 0}
  .cta-wrap{display:flex;justify-content:center;margin:56px 0 64px}
  .cta{background:var(--accent);color:#00120a;font-family:var(--mono);font-weight:700;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:13px 30px;border-radius:8px;text-decoration:none}
  .cta:hover{filter:brightness(1.06)}
  .eres{display:flex;flex-direction:column;gap:8px;align-items:flex-start;margin-bottom:34px}
  .eres-lbl{font-size:12px;color:var(--soft)}
  .pill-user{background:#fff;color:#0A0A0A;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.06em;padding:8px 20px;border-radius:8px;text-transform:uppercase}
  .sec-title{font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
  .sec-intro{color:var(--soft);font-size:13px;line-height:1.55;max-width:380px;margin-bottom:28px}
  .bloque{border:1.5px solid var(--ink);border-radius:18px;margin-bottom:36px;overflow:hidden;background:rgba(255,255,255,0.015)}
  .bloque-head{display:flex;align-items:center;gap:14px;padding:11px 16px;border-bottom:1.5px solid var(--ink)}
  .bloque .bnum{border:1px solid var(--ink);border-radius:999px;padding:3px 13px;font-family:var(--mono);font-size:10px;flex:0 0 auto}
  .bloque .btitle{flex:1;text-align:center;font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--soft)}
  .bloque .btitle b{color:var(--ink);font-weight:700}
  .bloque-body{padding:26px 30px}
  .bloque-body .grande{font-size:clamp(17px,2vw,24px);line-height:1.42;text-align:justify}
  .bloque-body .caption{margin-top:18px;font-size:13px;line-height:1.6;color:#CECECC;text-align:justify}
  .bloque-body .media{font-size:15px;line-height:1.6;text-align:justify;color:#E8E8E6}
  .bloque.critica{border-color:var(--accent)}
  .bloque.critica .bloque-head{border-color:var(--accent)}
  .bloque.critica .bnum{border-color:var(--accent);color:var(--accent)}
  .bloque.critica .btitle b{color:var(--accent)}
  .bloque .grafo-wrap{border:none;border-radius:0;margin-top:0}
  .selbar{display:flex;flex-direction:column;gap:8px;align-items:flex-start;margin:6px 0 32px}
  .sel-lbl{font-size:12px;color:var(--soft)}
  select.sel-pill{width:auto;max-width:280px;background:var(--accent);color:#00120a;border:none;border-radius:8px;font-family:var(--mono);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:10px 20px}
  .pie{margin-top:80px;padding:20px 0 8px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--soft);letter-spacing:.08em}

  .op{display:flex;flex-direction:column;gap:14px;margin-top:36px;max-width:520px}
  .btn{display:inline-flex;align-items:center;justify-content:space-between;padding:18px 22px;border:1px solid var(--hair);border-radius:8px;font-size:16px;transition:border-color .15s,background .15s,color .15s;text-decoration:none;color:var(--ink);background:var(--field)}
  .btn:hover{border-color:var(--accent)}
  .btn .arrow{color:var(--accent);font-family:var(--mono)}
  .btn.primary{background:var(--accent);color:#00120a;border-color:var(--accent);font-weight:600}
  .btn.primary .arrow{color:#00120a}
  .btn.primary:hover{filter:brightness(1.05)}

  /* captura */
  .rolbar{display:flex;gap:10px;align-items:center;margin-bottom:44px;flex-wrap:wrap}
  .rolbar label{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)}
  .rolbar label.accent{color:var(--accent)}
  .rolbar select{max-width:220px}
  .q{margin-bottom:44px}
  .q .qtitle{font-size:clamp(24px,3.4vw,40px);line-height:1.05;letter-spacing:-.01em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
  .q .qtitle .num{font-size:12px}
  .send-wrap{display:flex;justify-content:flex-end;margin-top:12px}
  .send{background:var(--accent);color:#00120a;padding:16px 28px;border-radius:8px;font-size:16px;font-weight:600;letter-spacing:.02em}
  .send:disabled{opacity:.4;cursor:not-allowed}
  .msg{margin-top:24px;padding:14px 18px;border-radius:8px;border:1px solid var(--hair);background:var(--field);font-size:14px;color:var(--soft)}
  .msg.ok{border-color:var(--accent);color:var(--accent)}
  .msg.err{border-color:#F26D6D;color:#F26D6D}

  /* thanks */
  .thanks{min-height:60vh;display:flex;flex-direction:column;justify-content:center}
  .thanks h1{font-size:clamp(40px,6vw,78px);line-height:.95;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:16px}
  .thanks .p{color:var(--soft);font-size:16px;max-width:560px;line-height:1.55}

  /* grafo */
  .grafo-wrap{position:relative;margin-top:16px;border:1px solid var(--hair);border-radius:12px;background:radial-gradient(120% 120% at 50% 0%,#111110 0%,#0b0b0a 70%);overflow:hidden}
  .grafo-wrap canvas{display:block;width:100%;cursor:default;touch-action:none}
  .grafo-legend{position:absolute;bottom:12px;left:14px;display:flex;gap:16px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft)}
  .grafo-legend span{display:inline-flex;align-items:center;gap:6px}
  .grafo-legend .dot{width:8px;height:8px;border-radius:999px;display:inline-block}
  .grafo-legend .dot.u{background:#fff}
  .grafo-legend .dot.c{background:var(--accent)}
  .grafo-legend .dot.a{background:#FF4885}
  .grafo-legend .hint{color:#5c5c5a}
  .grafo-card{position:absolute;z-index:6;width:min(340px,80vw);background:var(--field);border:1px solid var(--hair);border-radius:10px;padding:14px 16px;box-shadow:0 8px 30px rgba(0,0,0,.55)}
  .grafo-card.c{border-color:var(--accent)}
  .grafo-card.a{border-color:#FF4885}
  .grafo-card .t{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;padding-right:18px}
  .grafo-card.c .t{color:var(--accent)}
  .grafo-card.a .t{color:#FF4885}
  .grafo-card .d{font-size:13px;line-height:1.5;color:#CECECC}
  .grafo-card .x{position:absolute;top:8px;right:10px;color:var(--soft);font-size:14px;line-height:1}
  .grafo-card .x:hover{color:var(--ink)}
  /* facilitador */
  .fac{margin-top:80px;padding-top:32px;border-top:1px solid var(--hair);opacity:.6;transition:opacity .15s}
  .fac:hover{opacity:1}
  .fac .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--soft);margin-bottom:12px}
  .fac-row{display:flex;gap:10px;flex-wrap:wrap}
  .fac-row button{padding:10px 16px;border:1px solid var(--hair);border-radius:6px;font-size:13px;background:var(--field)}
  .fac-row button:hover{border-color:var(--accent);color:var(--accent)}
  .fac-row button.danger:hover{border-color:#FF4885;color:#FF4885}

  .hidden{display:none !important}
</style>
</head>
<body>

<div class="top">
  <span id="rolpill" class="pill hidden">Usuario1</span>
  <span class="year">2026</span>
</div>
<div class="spine">Cognición Aumentada · El Bosque</div>

<div class="wrap" id="app"></div>

<script>
  const CFG = {
    captura:    "https://fabianh.app.n8n.cloud/webhook/augurio-captura",
    procesar:   "https://fabianh.app.n8n.cloud/webhook/augurio-procesar",
    resultados: "https://fabianh.app.n8n.cloud/webhook/augurio-resultados",
    reset:      "https://fabianh.app.n8n.cloud/webhook/augurio-reset"
  };
  // El id viaja a Sheets en la columna "rol" y de ahí al prompt y al grafo;
  // se usa tal cual como etiqueta de los puntos, por eso id = etiqueta visible.
  const ROLES = [
    { id: "Dr M.R.",    label: "Dr M.R." },
    { id: "Dr J.C.S.P", label: "Dr J.C.S.P" },
    { id: "Dr J.G.M",   label: "Dr J.G.M" },
    { id: "Dra C.V.",   label: "Dra C.V." },
    { id: "Dra C.M.",   label: "Dra C.M." },
    { id: "Dr J.C.L",   label: "Dr J.C.L" },
    { id: "Dr C.F.E.",  label: "Dr C.F.E." },
    { id: "Ing R.G.",   label: "Ing R.G." },
    { id: "usuario1",   label: "Usuario 01" },
    { id: "usuario2",   label: "Usuario 02" }
  ];

  // Grafo de agrupamiento. Estructura que el sistema debe devolver:
  //   usuarios: nodos de participantes
  //   ideasCentrales: ideas que se repiten en el grupo (verde)
  //   ideasAusentes: ideas que nadie mencionó y deberían estar (rojo)
  //   conexiones: enlaces usuario -> idea central
  // Mientras n8n no lo entregue, se usa esta muestra representativa.
  const SAMPLE_GRAFO = {
    usuarios: ROLES.slice(0,6).map(r => ({ id:r.id, label:r.label })),
    ideasCentrales: [
      { id:"c1", label:"Bienestar", desc:"El cuidado integral de la persona aparece como principio rector en la mayoría de las voces del grupo. No se nombra como un servicio más, sino como el rasgo que ordena la identidad de la Universidad: lo que se hace, se hace primero por el bienestar de quien aprende y de quien enseña. Varias respuestas lo señalan además como la razón por la que la comunidad permanece y regresa." },
      { id:"c2", label:"Enfoque biopsicosocial", desc:"Ver la salud y la formación en cuerpo, mente y entorno al mismo tiempo es la seña distintiva que el grupo reconoce como propia. Las respuestas coinciden en que este enfoque atraviesa los programas y la cultura institucional, y en que ninguna otra universidad del país lo encarna con la misma profundidad. La tensión aparece al preguntarse si sigue siendo un diferencial o ya un punto de partida que otros alcanzaron." },
      { id:"c3", label:"Comunidad", desc:"El vínculo cercano entre estudiantes, profesores y administrativos se repite como el tejido que sostiene todo lo demás. El grupo lo describe como una escala humana que las universidades más grandes perdieron: aquí las personas se conocen por el nombre. Algunas voces advierten que ese capital es frágil y que el crecimiento institucional podría diluirlo si no se protege de forma deliberada." }
    ],
    ideasAusentes: [
      { id:"a1", label:"Internacionalización", desc:"Ninguna respuesta del grupo mencionó alianzas globales, movilidad académica ni proyección internacional. Para una universidad que compite por estudiantes y por investigación en un mercado abierto, ese silencio es notable: la conversación quedó completamente puertas adentro, mirando lo propio sin preguntarse cómo se conecta con el mundo." },
      { id:"a2", label:"Inteligencia artificial", desc:"El tema que convoca este taller no apareció en las voces del grupo. Nadie la nombró ni como oportunidad ni como riesgo, ni siquiera al hablar de los proyectos de 2026. La ausencia sugiere que la IA todavía se percibe como un asunto técnico y lejano, no como una fuerza que ya está reorganizando la docencia, la investigación y la gestión." },
      { id:"a3", label:"Sostenibilidad financiera", desc:"La base económica que sostiene todo lo demás quedó fuera de la conversación. El grupo habló de identidad, de dolores y de proyectos, pero ninguna voz se preguntó con qué recursos se financia ese futuro ni cómo se diversifican los ingresos. Es la condición de posibilidad de todas las demás ideas, y nadie la puso sobre la mesa." }
    ],
    conexiones: [
      { from:ROLES[0].id, to:"c1" }, { from:ROLES[0].id, to:"c2" },
      { from:ROLES[1].id, to:"c1" }, { from:ROLES[1].id, to:"c3" },
      { from:ROLES[2].id, to:"c2" },
      { from:ROLES[3].id, to:"c1" }, { from:ROLES[3].id, to:"c3" },
      { from:ROLES[4].id, to:"c3" },
      { from:ROLES[5].id, to:"c2" }, { from:ROLES[5].id, to:"c1" }
    ]
  };

  let grafoRAF = null;
  let grafoResize = null;

  const params = new URLSearchParams(location.search);
  const vista = params.get("vista") || "portada";
  const rolFijo = params.get("rol");
  const demo = params.get("demo") === "1";
  const fac = params.get("fac") === "1";

  // Datos de muestra para previsualizar la revelación sin n8n (?demo=1).
  const SAMPLE_RESULTADOS = ROLES.slice(0,6).map(r => ({
    rol: r.id,
    posicion: "Voz central del grupo: converge con la mayoría en torno al bienestar y la comunidad, y se distancia en el énfasis sobre lo administrativo.",
    comparativo: "Coincide con la muestra externa en poner a la persona en el centro, pero aporta un ángulo que la muestra no tiene: el vínculo con el egresado a largo plazo.",
    critica: "La propuesta se sostiene si el bienestar se traduce en indicadores; su supuesto frágil es asumir que la cultura ya existe sin diseñarla. La respuesta quedó sólida, aunque conviene nombrar el mecanismo concreto.",
    colectivo_conclusion: "El grupo lee a El Bosque desde el cuidado de la persona: el enfoque biopsicosocial no es un rasgo más, es el eje que ordena identidad, dolor y proyecto. La tensión de fondo es traducir ese cuidado en decisiones y sistemas, no dejarlo en discurso.",
    colectivo_agrupamiento: "Tres constelaciones: una mayoría orbita el bienestar y la comunidad; un grupo menor tira hacia lo administrativo y financiero; y una voz aislada insiste en el vínculo con el egresado. Faltan por completo la internacionalización, la inteligencia artificial y la sostenibilidad financiera: nadie las nombró.",
    colectivo_grafo: JSON.stringify(SAMPLE_GRAFO)
  }));

  const app = document.getElementById("app");
  const rolpill = document.getElementById("rolpill");

  function setRolPill(label){
    if(!label){ rolpill.classList.add("hidden"); return; }
    rolpill.textContent = label.toUpperCase();
    rolpill.classList.remove("hidden");
  }

  function h(html){ const t = document.createElement("template"); t.innerHTML = html.trim(); return t.content.firstChild; }

  function optRoles(){
    return ROLES.map(r => `<option value="${r.id}">${r.label}</option>`).join("");
  }

  // ---------- HOME (inicio + resultados) ----------
  function renderHome(){
    document.querySelector(".top").classList.add("hidden");
    document.querySelector(".spine").classList.add("hidden");
    app.innerHTML = `
      <header class="home-head">
        <div class="logo-box"><img src="assets/augurio-logo.png" alt="Augurio. Pensar todos, todo."></div>
        <h1 class="hola">HOLA!!!</h1>
        <p class="manifiesto">AUGURIO es un mecanismo de cognición aumentada en el que se recolectan datos de manera masiva y asincrónica. Esas voces se orquestan entre sí y con fuentes externas, para construir un conocimiento nuevo que ninguno formuló solo.</p>
      </header>
      <div class="head-line"></div>
      <div class="head-bosque"><img src="assets/bosque-logo.png" alt="Universidad El Bosque"></div>

      <div class="cta-wrap"><a class="cta" href="?vista=captura">Ir a las preguntas</a></div>

      <div id="eres" class="eres hidden">
        <span class="eres-lbl">Eres el:</span>
        <span class="pill-user" id="eres-pill"></span>
      </div>

      <div class="sec-title">Lectura colectiva</div>
      <p class="sec-intro">El grupo produjo un conocimiento en común que ninguno redactó solo. Abajo, la lectura colectiva. Más abajo, tu lectura personal tras seleccionar tu usuario.</p>

      <div id="cargando" class="msg">Cargando resultados...</div>
      <div id="colectivo" class="hidden"></div>
      <div id="personal" class="hidden"></div>

      ${fac ? `
      <div class="fac">
        <div class="lbl">Facilitador</div>
        <div class="fac-row">
          <button id="btn-procesar">Generar material aumentado</button>
          <button id="btn-recargar">Recargar resultados</button>
          <button id="btn-reset" class="danger">Reiniciar ejercicio</button>
        </div>
        <div id="fac-msg" class="msg hidden"></div>
      </div>` : ``}

      <footer class="pie">Fabian Herrera 2026</footer>
    `;

    if(fac){
      document.getElementById("btn-procesar").addEventListener("click", procesar);
      document.getElementById("btn-recargar").addEventListener("click", cargarResultados);
      document.getElementById("btn-reset").addEventListener("click", resetear);
    }

    setEres(localStorage.getItem("augurio_rol") || "");
    cargarResultados();
  }

  function setEres(rolId){
    const eres = document.getElementById("eres");
    const pill = document.getElementById("eres-pill");
    if(!eres) return;
    const label = labelOf(rolId);
    if(label){ pill.textContent = label; eres.classList.remove("hidden"); }
    else { eres.classList.add("hidden"); }
  }

  // ---------- CAPTURA ----------
  function renderCaptura(){
    const rolInicial = rolFijo || localStorage.getItem("augurio_rol") || "";
    if(rolInicial) setRolPill(labelOf(rolInicial));

    app.innerHTML = `
      <a class="back solid" href="?"><span class="arrow">←</span> Volver al inicio</a>
      <div class="kicker">Módulo I · vivir el paradigma</div>
      <h1 class="big">Tres<br>preguntas.</h1>
      <p class="ctx">Responde con tu criterio propio. No hay una respuesta correcta. Tus respuestas entrarán en un circuito de bots orquestados que permitirán tener una conversación aumentada con otros participantes.</p>

      <div class="rolbar">
        <label class="accent" for="rol">Selecciona tu usuario</label>
        <select id="rol">
          <option value="">—</option>
          ${optRoles()}
        </select>
      </div>

      <div class="q">
        <div class="qtitle"><span class="num">01</span>¿Qué nos hace únicos como universidad?</div>
        <p class="ctx">¿Qué hay en la Universidad El Bosque que ninguna otra universidad tiene y es muy valioso? ¿Qué percibe la comunidad como diferencia distintiva de la Universidad que no encuentra en otro lado?</p>
        <textarea id="q1" placeholder="Escribe aquí tu respuesta."></textarea>
      </div>

      <div class="q">
        <div class="qtitle"><span class="num">02</span>¿Cuál es nuestro mayor dolor en 2026?</div>
        <p class="ctx">Si pudieras elegir un solo reto, dificultad u oportunidad de mejora que la Universidad debería atender este año de manera urgente, ¿cuál sería?</p>
        <textarea id="q2" placeholder="Escribe aquí tu respuesta."></textarea>
      </div>

      <div class="q">
        <div class="qtitle"><span class="num">03</span>¿Cuál es nuestro proyecto clave para 2026?</div>
        <p class="ctx">Si pudieras escoger un proyecto para realizar con éxito al final de este año, que revirtiera en mayor valor a la Universidad, ¿cuál sería?</p>
        <textarea id="q3" placeholder="Escribe aquí tu respuesta."></textarea>
      </div>

      <div class="send-wrap">
        <button id="send" class="send" disabled>Enviar respuestas</button>
      </div>
      <div id="msg" class="msg hidden"></div>
    `;

    const rolSel = document.getElementById("rol");
    const q1 = document.getElementById("q1");
    const q2 = document.getElementById("q2");
    const q3 = document.getElementById("q3");
    const send = document.getElementById("send");
    const msg = document.getElementById("msg");

    if(rolInicial){ rolSel.value = rolInicial; }
    rolSel.addEventListener("change", () => {
      const v = rolSel.value;
      localStorage.setItem("augurio_rol", v);
      setRolPill(labelOf(v));
      validar();
    });
    [q1,q2,q3].forEach(el => el.addEventListener("input", validar));

    function validar(){
      const ok = rolSel.value && q1.value.trim() && q2.value.trim() && q3.value.trim();
      send.disabled = !ok;
    }
    validar();

    send.addEventListener("click", async () => {
      send.disabled = true;
      msg.className = "msg";
      msg.textContent = "Enviando...";
      msg.classList.remove("hidden");
      try{
        const r = await fetch(CFG.captura, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({
            rol: rolSel.value,
            q1: q1.value.trim(),
            q2: q2.value.trim(),
            q3: q3.value.trim()
          })
        });
        if(!r.ok) throw new Error("Error "+r.status);
        renderThanks(labelOf(rolSel.value));
      } catch(err){
        msg.className = "msg err";
        msg.textContent = "No se pudo enviar. Intenta de nuevo. ("+err.message+")";
        send.disabled = false;
      }
    });
  }

  function renderThanks(label){
    setRolPill(label);
    app.innerHTML = `
      <div class="thanks">
        <div class="kicker">Recibido</div>
        <h1>Gracias.</h1>
        <p class="p">Tu voz ya entró al ejercicio. En unos minutos verás el material colectivo y una lectura personal en tu dispositivo.</p>
        <div class="op">
          <a class="btn primary" href="?">Ir a los resultados <span class="arrow">→</span></a>
        </div>
      </div>
    `;
  }

  function labelOf(id){
    const r = ROLES.find(x => x.id === id);
    return r ? r.label : "";
  }

  async function cargarResultados(){
    const cargando = document.getElementById("cargando");
    const colDiv = document.getElementById("colectivo");
    const perDiv = document.getElementById("personal");
    cargando.classList.remove("hidden");
    cargando.textContent = "Cargando resultados...";
    colDiv.classList.add("hidden");
    perDiv.classList.add("hidden");

    try{
      let filas;
      if(demo){
        filas = SAMPLE_RESULTADOS;
      } else {
        const r = await fetch(CFG.resultados);
        if(!r.ok) throw new Error("Error "+r.status);
        const data = await r.json();
        filas = normalizar(data);
      }
      if(!filas.length){
        cargando.textContent = "Aún no hay material aumentado. Responde primero las tres preguntas; cuando el facilitador genere el material, aparecerá aquí.";
        return;
      }
      cargando.classList.add("hidden");

      const ultimo = filas[filas.length - 1];

      // Grafo real desde n8n (campo colectivo_grafo). Sin datos válidos,
      // solo el modo demo muestra la muestra; la revelación real lo oculta.
      let grafo = null;
      try { grafo = ultimo.colectivo_grafo ? JSON.parse(ultimo.colectivo_grafo) : null; } catch(e){ grafo = null; }
      const grafoValido = grafo && Array.isArray(grafo.usuarios) && grafo.usuarios.length
        && Array.isArray(grafo.ideasCentrales) && grafo.ideasCentrales.length;
      const grafoData = grafoValido ? grafo : (demo ? SAMPLE_GRAFO : null);

      colDiv.innerHTML = `
        <div class="bloque">
          <div class="bloque-head">
            <span class="bnum">1.</span>
            <div class="btitle"><b>Conclusión colectiva:</b> esto es lo que, en su conjunto, el grupo revela como patrón común</div>
          </div>
          <div class="bloque-body"><p class="grande">${escapar(ultimo.colectivo_conclusion || "—")}</p></div>
        </div>
        <div class="bloque">
          <div class="bloque-head">
            <span class="bnum">2.</span>
            <div class="btitle">${grafoData
              ? `<b>Grafo relacional:</b> estas son las relaciones entre conceptos y personas en la conversación`
              : `<b>Agrupamiento:</b> así se agrupan las voces del grupo`}</div>
          </div>
          <div class="bloque-body">
            ${grafoData ? `
            <div class="grafo-wrap">
              <canvas id="grafo-canvas"></canvas>
              <div class="grafo-legend">
                <span><i class="dot u"></i> Participante</span>
                <span><i class="dot c"></i> Idea que se repite</span>
                <span><i class="dot a"></i> Idea ausente</span>
                <span class="hint">Clic en una idea para ver su descripción</span>
              </div>
            </div>` : ``}
            <p class="caption">${escapar(ultimo.colectivo_agrupamiento || "—")}</p>
          </div>
        </div>
      `;

      colDiv.classList.remove("hidden");
      if(grafoData) initGrafo(grafoData);

      perDiv.innerHTML = `
        <div class="sec-title">Lectura individual</div>
        <p class="sec-intro">Selecciona tu usuario para ver, en este dispositivo, tu posición en el colectivo, tu comparativo contra la muestra externa y una lectura crítica de tu propuesta.</p>
        <div class="selbar">
          <label class="sel-lbl" for="rol2">Selecciona tu usuario:</label>
          <select id="rol2" class="sel-pill">
            <option value="">—</option>
            ${optRoles()}
          </select>
        </div>
        <div id="bloque-personal"></div>
      `;
      perDiv.classList.remove("hidden");

      const rolSel = document.getElementById("rol2");
      const bloque = document.getElementById("bloque-personal");
      const rolGuardado = localStorage.getItem("augurio_rol");
      if(rolGuardado){ rolSel.value = rolGuardado; mostrarPersonal(rolGuardado); }
      rolSel.addEventListener("change", () => {
        localStorage.setItem("augurio_rol", rolSel.value);
        setEres(rolSel.value);
        mostrarPersonal(rolSel.value);
      });

      function mostrarPersonal(rolId){
        if(!rolId){ bloque.innerHTML = ""; return; }
        const mio = [...filas].reverse().find(f => (f.rol||"").toLowerCase() === rolId.toLowerCase());
        if(!mio){
          bloque.innerHTML = `<div class="msg">No hay lectura personal para este usuario.</div>`;
          return;
        }
        bloque.innerHTML = `
          <div class="bloque">
            <div class="bloque-head">
              <span class="bnum">3.</span>
              <div class="btitle"><b>Tu posición en el colectivo</b></div>
            </div>
            <div class="bloque-body"><p class="media">${escapar(mio.posicion || "—")}</p></div>
          </div>
          <div class="bloque">
            <div class="bloque-head">
              <span class="bnum">4.</span>
              <div class="btitle"><b>Comparativo con la muestra externa</b></div>
            </div>
            <div class="bloque-body"><p class="media">${escapar(mio.comparativo || "—")}</p></div>
          </div>
          <div class="bloque critica">
            <div class="bloque-head">
              <span class="bnum">5.</span>
              <div class="btitle"><b>Lectura crítica de tu posición</b></div>
            </div>
            <div class="bloque-body"><p class="media">${escapar(mio.critica || "—")}</p></div>
          </div>
        `;
      }
    } catch(err){
      cargando.className = "msg err";
      cargando.textContent = "No se pudieron cargar los resultados. ("+err.message+")";
    }
  }

  async function procesar(){
    const facMsg = document.getElementById("fac-msg");
    facMsg.className = "msg";
    facMsg.textContent = "Procesando... esto toma unos segundos.";
    facMsg.classList.remove("hidden");
    try{
      const r = await fetch(CFG.procesar, { method:"POST" });
      if(!r.ok) throw new Error("Error "+r.status);
      facMsg.className = "msg ok";
      facMsg.textContent = "Listo. Recargando resultados.";
      setTimeout(cargarResultados, 800);
    } catch(err){
      facMsg.className = "msg err";
      facMsg.textContent = "Falló el procesamiento. ("+err.message+")";
    }
  }

  async function resetear(){
    const facMsg = document.getElementById("fac-msg");
    const escrito = prompt("Esto borra TODAS las respuestas y los resultados del ejercicio. La muestra externa no se toca.\n\nPara confirmar, escribe: BORRAR");
    if(escrito === null) return;
    if(escrito.trim().toUpperCase() !== "BORRAR"){
      facMsg.className = "msg err";
      facMsg.textContent = "Reinicio cancelado: la confirmación no coincide.";
      facMsg.classList.remove("hidden");
      return;
    }
    facMsg.className = "msg";
    facMsg.textContent = "Reiniciando...";
    facMsg.classList.remove("hidden");
    try{
      const r = await fetch(CFG.reset, { method:"POST" });
      if(!r.ok) throw new Error("Error "+r.status);
      facMsg.className = "msg ok";
      facMsg.textContent = "Ejercicio reiniciado. Las hojas quedaron vacías.";
      setTimeout(cargarResultados, 600);
    } catch(err){
      facMsg.className = "msg err";
      facMsg.textContent = "No se pudo reiniciar. ("+err.message+")";
    }
  }

  function normalizar(data){
    if(Array.isArray(data)) return data;
    if(data && Array.isArray(data.data)) return data.data;
    if(data && typeof data === "object") return [data];
    return [];
  }

  function escapar(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  // ---------- GRAFO DE AGRUPAMIENTO ----------
  function initGrafo(grafo){
    const canvas = document.getElementById("grafo-canvas");
    if(!canvas || !grafo) return;
    const wrap = canvas.parentElement;
    const ctx = canvas.getContext("2d");
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const H = 460;
    let W = wrap.clientWidth || 800;

    let cx, cy;
    function size(){
      W = wrap.clientWidth || 800;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      canvas.style.height = H + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      cx = W / 2; cy = H / 2;
    }
    size();

    const nodes = [];
    const byId = {};
    function add(n){ nodes.push(n); byId[n.id] = n; }
    const spread = (dx, dy) => ({ x: cx + (Math.random()-0.5)*dx, y: cy + (Math.random()-0.5)*dy });

    (grafo.usuarios || []).forEach(u => { const p = spread(180,180); add({ id:u.id, label:u.label||u.id, type:"user", x:p.x, y:p.y, vx:0, vy:0, r:6 }); });
    (grafo.ideasCentrales || []).forEach(c => { const p = spread(120,120); add({ id:c.id, label:c.label, desc:c.desc, type:"central", x:p.x, y:p.y, vx:0, vy:0, r:10 }); });
    (grafo.ideasAusentes || []).forEach(a => { const p = spread(260,260); add({ id:a.id, label:a.label, desc:a.desc, type:"absent", x:p.x, y:p.y, vx:0, vy:0, r:6 }); });
    const edges = (grafo.conexiones || []).filter(e => byId[e.from] && byId[e.to]);

    const REST = 96, K_SPRING = 0.02, K_REP = 3000, K_CENTER = 0.008, DAMP = 0.86;
    let dragging = null;

    function step(){
      for(let i=0;i<nodes.length;i++){
        const a = nodes[i];
        for(let j=i+1;j<nodes.length;j++){
          const b = nodes[j];
          let dx = a.x-b.x, dy = a.y-b.y;
          let d2 = dx*dx + dy*dy || 0.01;
          let d = Math.sqrt(d2);
          let rep = K_REP;
          if(a.type === "central" && b.type === "central") rep *= 4;
          let f = rep / d2;
          let fx = (dx/d)*f, fy = (dy/d)*f;
          a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
        }
      }
      edges.forEach(e => {
        const a = byId[e.from], b = byId[e.to];
        let dx = b.x-a.x, dy = b.y-a.y;
        let d = Math.sqrt(dx*dx + dy*dy) || 0.01;
        let f = (d - REST) * K_SPRING;
        let fx = (dx/d)*f, fy = (dy/d)*f;
        a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
      });
      nodes.forEach(n => {
        if(n === dragging){ n.vx = 0; n.vy = 0; return; }
        n.vx += (cx - n.x) * K_CENTER;
        n.vy += (cy - n.y) * K_CENTER;
        n.vx += (Math.random()-0.5) * 0.18;
        n.vy += (Math.random()-0.5) * 0.18;
        n.vx *= DAMP; n.vy *= DAMP;
        n.x += n.vx; n.y += n.vy;
        const m = 26;
        n.x = Math.max(m, Math.min(W-m, n.x));
        n.y = Math.max(m, Math.min(H-m, n.y));
      });
    }

    function draw(){
      ctx.clearRect(0, 0, W, H);
      ctx.lineWidth = 1;
      edges.forEach(e => {
        const a = byId[e.from], b = byId[e.to];
        ctx.strokeStyle = "rgba(138,138,136,0.32)";
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      });
      nodes.forEach(n => {
        const color = n.type === "central" ? "#17F7A1" : n.type === "absent" ? "#FF4885" : "#FFFFFF";
        ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        if(n.type === "absent"){
          ctx.beginPath(); ctx.arc(n.x, n.y, n.r+5, 0, Math.PI*2);
          ctx.strokeStyle = "rgba(255,72,133,0.35)";
          ctx.setLineDash([2,3]); ctx.stroke(); ctx.setLineDash([]);
        }
        ctx.fillStyle = n.type === "user" ? "rgba(255,255,255,0.6)" : color;
        ctx.font = (n.type === "central" ? "600 " : "") + '11px "IBM Plex Mono", monospace';
        ctx.textAlign = "center";
        const tw = ctx.measureText(n.label).width;
        const tx = Math.max(6 + tw/2, Math.min(W - 6 - tw/2, n.x));
        ctx.fillText(n.label, tx, n.y - n.r - 7);
      });
    }

    function loop(){ step(); draw(); grafoRAF = requestAnimationFrame(loop); }
    if(grafoRAF) cancelAnimationFrame(grafoRAF);
    loop();

    // --- interacción: arrastre con pointer capture y tarjetas al clic ---
    let pressPos = null, moved = false, card = null;

    function pos(e){
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (W / rect.width),
        y: (e.clientY - rect.top) * (H / rect.height)
      };
    }
    function nodeAt(x, y){
      for(let i=nodes.length-1;i>=0;i--){
        const n = nodes[i];
        const dx = n.x - x, dy = n.y - y, hit = Math.max(n.r + 12, 16);
        if(dx*dx + dy*dy <= hit*hit) return n;
      }
      return null;
    }
    function hideCard(){ if(card){ card.remove(); card = null; } }
    function showCard(n){
      hideCard();
      card = document.createElement("div");
      card.className = "grafo-card " + (n.type === "central" ? "c" : "a");
      card.innerHTML = `<button class="x" aria-label="Cerrar">×</button><div class="t">${escapar(n.label)}</div><div class="d">${escapar(n.desc || "Sin descripción disponible.")}</div>`;
      wrap.appendChild(card);
      const rect = canvas.getBoundingClientRect();
      const sx = rect.width / W, sy = rect.height / H;
      const nx = n.x * sx, ny = n.y * sy;
      const cw = card.offsetWidth || 250, chh = card.offsetHeight || 100;
      let x = nx + 18, y = ny - chh/2;
      if(x + cw > rect.width - 10) x = nx - cw - 18;
      x = Math.max(10, x);
      y = Math.max(10, Math.min(rect.height - chh - 10, y));
      card.style.left = x + "px"; card.style.top = y + "px";
      card.querySelector(".x").addEventListener("click", hideCard);
    }

    canvas.addEventListener("pointerdown", e => {
      const p = pos(e);
      const n = nodeAt(p.x, p.y);
      hideCard();
      if(n){
        dragging = n; moved = false; pressPos = p;
        try { canvas.setPointerCapture(e.pointerId); } catch(_) {}
        canvas.style.cursor = "grabbing";
        e.preventDefault();
      }
    });
    canvas.addEventListener("pointermove", e => {
      const p = pos(e);
      if(dragging){
        if(Math.hypot(p.x - pressPos.x, p.y - pressPos.y) > 5) moved = true;
        const m = 26;
        dragging.x = Math.max(m, Math.min(W - m, p.x));
        dragging.y = Math.max(m, Math.min(H - m, p.y));
        dragging.vx = 0; dragging.vy = 0;
        e.preventDefault();
      } else {
        canvas.style.cursor = nodeAt(p.x, p.y) ? "pointer" : "default";
      }
    });
    canvas.addEventListener("pointerup", () => {
      if(dragging && !moved && (dragging.type === "central" || dragging.type === "absent")){
        showCard(dragging);
      }
      dragging = null;
      canvas.style.cursor = "default";
    });
    canvas.addEventListener("pointercancel", () => { dragging = null; canvas.style.cursor = "default"; });

    if(grafoResize) window.removeEventListener("resize", grafoResize);
    grafoResize = () => size();
    window.addEventListener("resize", grafoResize);
  }

  // router: la raíz es la página de participantes; ?vista=revelacion se
  // conserva como alias para los enlaces ya repartidos.
  if(vista === "captura") renderCaptura();
  else renderHome();
</script>
